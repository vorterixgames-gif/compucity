<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Circuit pattern for Compucity brand -->
  <defs>
    <pattern id="circuit" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <!-- Horizontal lines -->
      <line x1="0" y1="20" x2="80" y2="20" stroke="#00C2FF" stroke-width="0.5" opacity="0.3"/>
      <line x1="100" y1="20" x2="200" y2="20" stroke="#00C2FF" stroke-width="0.5" opacity="0.2"/>
      <line x1="0" y1="60" x2="40" y2="60" stroke="#00C2FF" stroke-width="0.5" opacity="0.25"/>
      <line x1="60" y1="60" x2="160" y2="60" stroke="#00C2FF" stroke-width="0.5" opacity="0.15"/>
      <line x1="0" y1="100" x2="100" y2="100" stroke="#00C2FF" stroke-width="0.5" opacity="0.2"/>
      <line x1="120" y1="100" x2="200" y2="100" stroke="#00C2FF" stroke-width="0.5" opacity="0.3"/>
      <line x1="0" y1="140" x2="60" y2="140" stroke="#00C2FF" stroke-width="0.5" opacity="0.15"/>
      <line x1="80" y1="140" x2="180" y2="140" stroke="#00C2FF" stroke-width="0.5" opacity="0.25"/>
      <line x1="0" y1="180" x2="120" y2="180" stroke="#00C2FF" stroke-width="0.5" opacity="0.2"/>
      <line x1="140" y1="180" x2="200" y2="180" stroke="#00C2FF" stroke-width="0.5" opacity="0.3"/>
      
      <!-- Vertical lines -->
      <line x1="20" y1="0" x2="20" y2="60" stroke="#00C2FF" stroke-width="0.5" opacity="0.2"/>
      <line x1="20" y1="80" x2="20" y2="160" stroke="#00C2FF" stroke-width="0.5" opacity="0.15"/>
      <line x1="60" y1="0" x2="60" y2="40" stroke="#00C2FF" stroke-width="0.5" opacity="0.25"/>
      <line x1="60" y1="60" x2="60" y2="100" stroke="#00C2FF" stroke-width="0.5" opacity="0.2"/>
      <line x1="60" y1="120" x2="60" y2="200" stroke="#00C2FF" stroke-width="0.5" opacity="0.15"/>
      <line x1="100" y1="0" x2="100" y2="80" stroke="#00C2FF" stroke-width="0.5" opacity="0.3"/>
      <line x1="100" y1="100" x2="100" y2="180" stroke="#00C2FF" stroke-width="0.5" opacity="0.2"/>
      <line x1="140" y1="0" x2="140" y2="60" stroke="#00C2FF" stroke-width="0.5" opacity="0.15"/>
      <line x1="140" y1="80" x2="140" y2="140" stroke="#00C2FF" stroke-width="0.5" opacity="0.25"/>
      <line x1="140" y1="160" x2="140" y2="200" stroke="#00C2FF" stroke-width="0.5" opacity="0.2"/>
      <line x1="180" y1="0" x2="180" y2="100" stroke="#00C2FF" stroke-width="0.5" opacity="0.2"/>
      <line x1="180" y1="120" x2="180" y2="200" stroke="#00C2FF" stroke-width="0.5" opacity="0.3"/>
      
      <!-- Connection dots (nodes) -->
      <circle cx="20" cy="20" r="2" fill="#00C2FF" opacity="0.4"/>
      <circle cx="60" cy="60" r="2" fill="#00C2FF" opacity="0.5"/>
      <circle cx="100" cy="20" r="2" fill="#00C2FF" opacity="0.35"/>
      <circle cx="140" cy="100" r="2" fill="#00C2FF" opacity="0.4"/>
      <circle cx="180" cy="60" r="2" fill="#00C2FF" opacity="0.3"/>
      <circle cx="20" cy="140" r="2" fill="#00C2FF" opacity="0.35"/>
      <circle cx="60" cy="100" r="2" fill="#00C2FF" opacity="0.45"/>
      <circle cx="100" cy="140" r="2" fill="#00C2FF" opacity="0.4"/>
      <circle cx="140" cy="180" r="2" fill="#00C2FF" opacity="0.3"/>
      <circle cx="180" cy="140" r="2" fill="#00C2FF" opacity="0.5"/>
      <circle cx="100" cy="180" r="2" fill="#00C2FF" opacity="0.35"/>
      <circle cx="60" cy="180" r="2" fill="#00C2FF" opacity="0.3"/>
      
      <!-- Corner accents (small squares at intersections) -->
      <rect x="18" y="58" width="4" height="4" fill="#00C2FF" opacity="0.15" rx="0.5"/>
      <rect x="98" y="98" width="4" height="4" fill="#00C2FF" opacity="0.15" rx="0.5"/>
      <rect x="138" y="58" width="4" height="4" fill="#00C2FF" opacity="0.15" rx="0.5"/>
      <rect x="178" y="138" width="4" height="4" fill="#00C2FF" opacity="0.15" rx="0.5"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#circuit)"/>
</svg>
